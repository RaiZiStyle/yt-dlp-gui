name: Build & Release Windows

on:
  push:
    tags:
      - 'v*'          # déclenche uniquement sur un tag : git tag v1.0.0 && git push origin v1.0.0


permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Inject version from git tag in src/version.py
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          (Get-Content src/version.py) -replace '"dev"', "`"$version`"" | Set-Content src/version.py
          cat src/version.py   # vérification dans les logs CI

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm yt-dlp-gui.spec

      # ffmpeg statique embarqué dans le bundle, pas besoin que l'user l'installe
      - name: Bundle ffmpeg
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Invoke-WebRequest $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $ffmpegExe = Get-ChildItem -Recurse ffmpeg_tmp -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName -Destination dist\yt-dlp-gui\ffmpeg.exe

      # Inno Setup est préinstallé sur windows-latest
      # On injecte la version du tag git dans le .iss dynamiquement
      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $isccPath /DMyAppVersion="$version" installer\setup.iss

      - name: Upload installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: installer_output/yt-dlp-gui_*.exe
          generate_release_notes: true   # génère automatiquement les release notes depuis les commits